<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta | Sin Enredos Barber</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main>
    <section class="onboarding-section">
      <div class="container onboarding-wrapper">
        <div class="onboarding-card">

          <img
            src="img/logo-sin-enredos.jpeg"
            alt="Logo Sin Enredos"
            class="onboarding-logo"
          >

          <h1 class="onboarding-title">SIN ENREDOS</h1>
          <p class="onboarding-subtitle">Barbería y Peluquería</p>

          <p class="onboarding-copy">
            Agenda tu cita, acumula puntos y obtén<br>
            descuentos exclusivos.
          </p>

          <!-- Botones principales -->
          <a href="#" class="btn btn--primary onboarding-btn">
            CREAR CUENTA
          </a>

          <a href="login.html" class="btn btn--secondary onboarding-btn onboarding-btn--outline">
            INICIAR SESIÓN
          </a>

          <p class="onboarding-note">
            ¿Primera vez aquí?<br>
            Regístrate y obtén <strong>20% de descuento</strong>
          </p>

        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__content">
      <p>© 2025 Sin Enredos Barber. Todos los derechos reservados.</p>
      <p>Hecho con tijeras, café y código.</p>
    </div>
  </footer>

</body>
</html>
